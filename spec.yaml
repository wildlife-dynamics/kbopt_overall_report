id: overall_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.22.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.39.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.18.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "0.0.8.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ate
    version: "0.0.3.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-big-life
    version: "0.0.8.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-kbopt
    version: "0.0.7.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:
  - name: Set Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Time range
    id: time_range
    task: set_time_range

  - name: Extract Timezone Selection
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  - name: Set groupers
    id: groupers
    task: set_groupers
    partial:
      groupers:
        - spatial_index_name: "Conservation Name"
        
  - name: Connect to ER 
    id: er_client_name
    task: set_er_connection

  # Set base maps
  - name: Base Maps
    id: configure_base_maps
    task: set_base_maps_pydeck
    partial: 
      base_maps:
        - url: >-
            https://server.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}
          opacity: 1
          max_zoom: 20
        - url: >-
            https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}
          opacity: 0.04
          max_zoom: 20

  - name: Set time range from 2000-01-01 to until
    id: overall_time_range 
    task: get_time_range_to_until
    partial: 
      time_range: ${{ workflow.time_range.return }}

  - name: Get time range from 2000-01-01 to since in time range 
    id: previous_time_range
    task: get_time_range_before_since
    partial: 
      time_range: ${{ workflow.time_range.return }}

  - name: Download KBOPT geoparquet file
    id: persist_kbopt_gpq
    task: fetch_and_persist_file
    partial: 
      url: https://www.dropbox.com/scl/fi/i476ltynyt7zimi8zb8f2/kbopt_.geoparquet?rlkey=50dmzukcqj2x5kzqjj7eyc8no&st=bfawmyer&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Download KBOPT logo image for html
    id: persist_kbopt_logo
    task: fetch_and_persist_file
    partial: 
      url: https://www.dropbox.com/scl/fi/1f2z6er8f06jj9rrhlac2/kbopt?rlkey=enpczqy88e1uidag1m4bqmske&st=gzdsj2lp&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Load kbopt geoparquet file 
    id: load_kbopt_gpq
    task: load_df 
    partial: 
      file_path: ${{ workflow.persist_kbopt_gpq.return }}
      layer: null
      deserialize_json: false 
  
  - name: Reproject gdf to 4326 for kbopt boundaries
    id: reproject_kbopt_gpq
    task: reproject_gdf
    partial: 
      gdf: ${{ workflow.load_kbopt_gpq.return }}
      target_crs: "EPSG:4326"

  - name: Filter loaded kbopt gdf by AOI 
    id: filter_kbopt_aoi 
    task: filter_row_values 
    partial: 
      df: ${{ workflow.reproject_kbopt_gpq.return }}
      column: "Conservation Name"
      values: 
        - "Mara Triangle"
        - "Naboisho"
        - "Maasai Mara National Reserve"

  - name: Convert kbopt GDF to regions format
    id: kbopt_regions_gdf
    task: convert_kbopt_to_regions_gdf
    partial:
      gdf: ${{ workflow.filter_kbopt_aoi.return }}
      name_column: "Conservation Name"

  - name: Resolve spatial groupers with kbopt regions
    id: resolved_groupers
    task: resolve_spatial_feature_groups_for_spatial_groupers
    skipif:
      conditions:
        - never
    partial:
      groupers: ${{ workflow.groupers.return }}
      spatial_feature_groups: ${{ workflow.kbopt_regions_gdf.return }}

  - name: Retrieve all nest id events to date 
    id: retrieve_nest_ids 
    task: get_events 
    partial: 
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.overall_time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
      event_types:
        - nest_id
      raise_on_empty: false
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: false

  - name: Retrieve all nest checks before hand until since 
    id: retrieve_previous_nest_events 
    task: get_events
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.previous_time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
      event_types:
        - nest_check 
      raise_on_empty: false
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: false

  - name: Retrieve nest check events 
    id: get_events_data 
    task: get_events 
    partial: 
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
      event_types:
        - nest_check 
      raise_on_empty: false
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: false

  - name: Process current nest_check events details
    id: process_current_nest_check
    task: process_events_details 
    partial: 
      df: ${{ workflow.get_events_data.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true

  - name: Normalize nest_check events details
    id: normalize_nest_check
    task: normalize_json_column
    partial:
      column: event_details
      df: ${{ workflow.process_current_nest_check.return }}
      skip_if_not_exists: true 
      sort_columns: true 

  - name: Drop column prefix from normalized nest_check details
    id: drop_nest_check_prefix 
    task: drop_column_prefix
    partial: 
      df: ${{ workflow.normalize_nest_check.return }}
      prefix: event_details__
      duplicate_strategy: keep_original 

  - name: Process nest_id events details
    id: process_nest_id
    task: process_events_details 
    partial: 
      df: ${{ workflow.retrieve_nest_ids.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true
      ordered: true

  - name: Normalize nest_id events details
    id: normalize_nest_id
    task: normalize_json_column
    partial:
      column: event_details
      df: ${{ workflow.process_nest_id.return }}
      skip_if_not_exists: true
      sort_columns: true

  - name: Drop column prefix from normalized nest_id details
    id: drop_nest_id_prefix
    task: drop_column_prefix  
    partial:
      df: ${{ workflow.normalize_nest_id.return }}
      prefix: event_details__
      duplicate_strategy: keep_original

  - name: Process previous nest_check events details
    id: process_previous_nest_check
    task: process_events_details 
    partial: 
      df: ${{ workflow.retrieve_previous_nest_events.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true

  - name: Normalize previous nest_check events details
    id: normalize_previous_nest_check
    task: normalize_json_column
    partial:
      column: event_details
      df: ${{ workflow.process_previous_nest_check.return }}
      skip_if_not_exists: true 
      sort_columns: true 

  - name: Drop column prefix from previous normalized nest_check details
    id: drop_previous_nest_check_prefix 
    task: drop_column_prefix
    partial: 
      df: ${{ workflow.normalize_previous_nest_check.return }}
      prefix: event_details__
      duplicate_strategy: keep_original 

  # groupers for current shapefile
  - name: Add spatial index to current nest_check events
    id: add_spatial_idx_curr_nest_chk
    task: add_spatial_index
    partial:
      gdf: ${{ workflow.drop_nest_check_prefix.return }}
      groupers: ${{ workflow.resolved_groupers.return }}

  - name: Restore Conservation Name column for current nest_check events
    id: restore_current_col_nest_check
    task: add_column_from_index_level
    partial:
      gdf: ${{ workflow.add_spatial_idx_curr_nest_chk.return }}
      index_name: "SpatialGrouper_Conservation Name"
      column_name: "Conservation Name"

  - name: Add spatial index to previous nest_check events
    id: add_spatial_idx_prev_nest_chk
    task: add_spatial_index
    partial:
      gdf: ${{ workflow.drop_previous_nest_check_prefix.return }}
      groupers: ${{ workflow.resolved_groupers.return }}

  - name: Restore Conservation Name column for previous nest_check events
    id: restore_previous_col_nest_check
    task: add_column_from_index_level
    partial:
      gdf: ${{ workflow.add_spatial_idx_prev_nest_chk.return }}
      index_name: "SpatialGrouper_Conservation Name"
      column_name: "Conservation Name"

  - name: Add spatial index to nest_id events
    id: add_spatial_index_nest_id
    task: add_spatial_index
    partial:
      gdf: ${{ workflow.drop_nest_id_prefix.return }}
      groupers: ${{ workflow.resolved_groupers.return }}

  - name: Restore Conservation Name column for nest_id events
    id: restore_col_nest_id
    task: add_column_from_index_level
    partial:
      gdf: ${{ workflow.add_spatial_index_nest_id.return }}
      index_name: "SpatialGrouper_Conservation Name"
      column_name: "Conservation Name"

  - name: Replace Unknown Values in current nest_check events
    id: replace_current_missing_unknown
    task: replace_missing_with_label
    partial:
      df: ${{ workflow.restore_current_col_nest_check.return }}
      columns: ["Species",]
      label: "Unknown"

  - name: Convert current nest_check Species to string 
    id: convert_current_species_string
    task: convert_to_string
    partial: 
      columns: 
        - "Species"
      inplace: false 
      df: ${{ workflow.replace_current_missing_unknown.return}}

  - name: Replace Unknown Values in previous nest_check events
    id: replace_previous_missing_unknown
    task: replace_missing_with_label
    partial:
      df: ${{ workflow.restore_previous_col_nest_check.return }}
      columns: ["Species",]
      label: "Unknown"

  - name: Convert previous nest_check Species to string 
    id: convert_previous_species_string
    task: convert_to_string
    partial: 
      columns: 
        - "Species"
      inplace: false 
      df: ${{ workflow.replace_previous_missing_unknown.return}}

  - name: Map species columns 
    id: map_current_species_column
    task: map_column_value 
    partial: 
      df:  ${{ workflow.convert_current_species_string.return }}
      col: "Species"
      new_col: "Species"
      mapping: 
        "Bateleur": "Bateleur"
        "Buzzard_Augur": "Augur Buzzard"
        "Buzzard_Lizard": "Lizard Buzzard"
        "Chanting-goshawk_Dark": "Dark chanting goshawk"
        "Crane_Grey-crowned": "Grey crowned crane"
        "Cuckoo-hawk_African": "African cuckoo-hawk"
        "Eagle_Crowned": "Crowned eagle"
        "Eagle_Long-crested": "Long-crested eagle"
        "Eagle_Martial": "Martial eagle"
        "Eagle_Tawny": "Tawny eagle"
        "Eagle_Verreaux\\'s": "Verreaux\\'s eagle"
        "Eagle_Wahlberg\\'s": "Wahlberg\\'s eagle"
        "Eagle-owl_Spotted": "Spotted eagle owl"
        "Eagle-owl_Verreaux\\'s": "Verreaux\\'s eagle owl"
        "Falcon_Lanner": "Lanner falcon"
        "Falcon_Peregrine": "Peregrine falcon"
        "Fish-eagle_African": "African fish eagle"
        "Fishing-owl_Pel\\'s": "Pel\\'s fishing owl"
        "Goose_Egyptian": "Egyptian goose"
        "Goshawk_African": "African goshawk"
        "Goshawk_Gabar": "Gabar goshawk"
        "Harrier-hawk_African": "African harrier hawk"
        "Hawk_Bat": "Bat hawk"
        "Hawk-eagle_African": "African hawk eagle"
        "Hawk-eagle_Ayres\\'s": "Ayre\\'s hawk eagle"
        "Hobby_African": "African hobby"
        "Hornbill_Southern_Ground": "Southern ground hornbill"
        "Kestrel_Grey": "Grey kestrel"
        "Kestrel_Mountain": "Mountain kestrel"
        "Kite_Black": "Black kite"
        "Kite_Black-winged": "Black-winged kite"
        "Owl_African_Wood": "African wood owl"
        "Owl_Barn": "Barn owl"
        "Owl_Marsh": "Marsh owl"
        "Owl_Southern_White-faced": "Southern white-faced owl"
        "Owlet_Pearl-spotted": "Pearl-spotted owlet"
        "Pygmy-falcon_African": "African pygmy falcon"
        "Scops-owl_African": "African scops owl"
        "Secretarybird": "Secretarybird"
        "Shikra": "Shikra"
        "Snake-eagle_Black-chested": "Black-chested snake eagle"
        "Snake-eagle_Brown": "Brown snake eagle"
        "Snake-eagle_Western_Banded": "Western banded snake eagle"
        "Sparrowhawk_Black": "Black sparrowhawk"
        "Sparrowhawk_Little": "Little sparrowhawk"
        "Sparrowhawk_Ovambo": "Ovambo sparrowhawk"
        "Stork_Saddle-billed": "Saddle-billed stork"
        "Vulture_Hooded": "Hooded vulture"
        "Vulture_Lappet-faced": "Lappet-faced vulture"
        "Vulture_White-backed": "White-backed vulture"
        "Vulture_White-headed": "White-headed vulture"
        "Others": "Others"
        "Unknown": "Unknown"

  - name: Assign colors to species
    id: species_colors
    task: get_color_map
    partial: 
      df: ${{ workflow.map_current_species_column.return }}
      col: "Species"
      color_dict:
        "Bateleur": "#2E6045"
        "Augur Buzzard": "#D86DCD"
        "Lizard Buzzard": "#B5E6A2"
        "Dark chanting goshawk": "#56250A"
        "Grey crowned crane": "#72FCD1"
        "African cuckoo-hawk": "#FFFF99"
        "Crowned eagle": "#0AA281"
        "Long-crested eagle": "#A6C9EC"
        "Martial eagle": "#156082"
        "Tawny eagle": "#9B612D"
        "Verreaux\\'s eagle": "#C5ABB1"
        "Wahlberg\\'s eagle": "#F98C07"
        "Spotted eagle owl": "#3C7D22"
        "Verreaux\\'s eagle owl": "#B81E04"
        "Lanner falcon": "#E0A762"
        "Peregrine falcon": "#E0A762"
        "African fish eagle": "#FFCC00"
        "Pel\\'s fishing owl": "#3C7D22"
        "Egyptian goose": "#F3AC85"
        "African goshawk": "#3292DA"
        "Gabar goshawk": "#C0E6F5"
        "African harrier hawk": "#5CC836"
        "Bat hawk": "#2CE4DB"
        "African hawk eagle": "#2CE4DB"
        "Ayre\\'s hawk eagle": "#2CE4DB"
        "African hobby": "#C0E6F5"
        "Southern ground hornbill": "#FF3333"
        "Grey kestrel": "#7F2376"
        "Mountain kestrel": "#7F2376"
        "Black kite": "#F0EA00"
        "Black-winged kite": "#F0EA00"
        "African wood owl": "#3C7D22"
        "Barn owl": "#3C7D22"
        "Marsh owl": "#3C7D22"
        "Southern white-faced owl": "#3C7D22"
        "Pearl-spotted owlet": "#3C7D22"
        "African pygmy falcon": "#E0A762"
        "African scops owl": "#3C7D22"
        "Secretarybird": "#338577"
        "Shikra": "#F7E1F5"
        "Black-chested snake eagle": "#808080"
        "Brown snake eagle": "#BF7823"
        "Western banded snake eagle": "#534C15"
        "Black sparrowhawk": "#0F9ED5"
        "Little sparrowhawk": "#0F9ED5"
        "Ovambo sparrowhawk": "#0F9ED5"
        "Saddle-billed stork": "#CD3B5E"
        "Hooded vulture": "#75DBFF"
        "Lappet-faced vulture": "#52349E"
        "White-backed vulture": "#DAD486"
        "White-headed vulture": "#F35757"
        "Others": "#FFFFFF"
        "Unknown": "#000000"

  - name: Map species to colors for nest check events
    id: map_species_colors
    task: custom_map_color_column_value
    partial:
      df: ${{ workflow.map_current_species_column.return }}
      col: "Species"
      mapping: ${{ workflow.species_colors.return }}
      new_col: "species_colors"
      default_color: "#808080"

  - name: Map previous species columns 
    id: map_previous_species_column
    task: map_column_value 
    partial: 
      df:  ${{ workflow.convert_previous_species_string.return }}
      col: "Species"
      new_col: "Species"
      mapping: 
        "Bateleur": "Bateleur"
        "Buzzard_Augur": "Augur Buzzard"
        "Buzzard_Lizard": "Lizard Buzzard"
        "Chanting-goshawk_Dark": "Dark chanting goshawk"
        "Crane_Grey-crowned": "Grey crowned crane"
        "Cuckoo-hawk_African": "African cuckoo-hawk"
        "Eagle_Crowned": "Crowned eagle"
        "Eagle_Long-crested": "Long-crested eagle"
        "Eagle_Martial": "Martial eagle"
        "Eagle_Tawny": "Tawny eagle"
        "Eagle_Verreaux\\'s": "Verreaux\\'s eagle"
        "Eagle_Wahlberg\\'s": "Wahlberg\\'s eagle"
        "Eagle-owl_Spotted": "Spotted eagle owl"
        "Eagle-owl_Verreaux\\'s": "Verreaux\\'s eagle owl"
        "Falcon_Lanner": "Lanner falcon"
        "Falcon_Peregrine": "Peregrine falcon"
        "Fish-eagle_African": "African fish eagle"
        "Fishing-owl_Pel\\'s": "Pel\\'s fishing owl"
        "Goose_Egyptian": "Egyptian goose"
        "Goshawk_African": "African goshawk"
        "Goshawk_Gabar": "Gabar goshawk"
        "Harrier-hawk_African": "African harrier hawk"
        "Hawk_Bat": "Bat hawk"
        "Hawk-eagle_African": "African hawk eagle"
        "Hawk-eagle_Ayres\\'s": "Ayre\\'s hawk eagle"
        "Hobby_African": "African hobby"
        "Hornbill_Southern_Ground": "Southern ground hornbill"
        "Kestrel_Grey": "Grey kestrel"
        "Kestrel_Mountain": "Mountain kestrel"
        "Kite_Black": "Black kite"
        "Kite_Black-winged": "Black-winged kite"
        "Owl_African_Wood": "African wood owl"
        "Owl_Barn": "Barn owl"
        "Owl_Marsh": "Marsh owl"
        "Owl_Southern_White-faced": "Southern white-faced owl"
        "Owlet_Pearl-spotted": "Pearl-spotted owlet"
        "Pygmy-falcon_African": "African pygmy falcon"
        "Scops-owl_African": "African scops owl"
        "Secretarybird": "Secretarybird"
        "Shikra": "Shikra"
        "Snake-eagle_Black-chested": "Black-chested snake eagle"
        "Snake-eagle_Brown": "Brown snake eagle"
        "Snake-eagle_Western_Banded": "Western banded snake eagle"
        "Sparrowhawk_Black": "Black sparrowhawk"
        "Sparrowhawk_Little": "Little sparrowhawk"
        "Sparrowhawk_Ovambo": "Ovambo sparrowhawk"
        "Stork_Saddle-billed": "Saddle-billed stork"
        "Vulture_Hooded": "Hooded vulture"
        "Vulture_Lappet-faced": "Lappet-faced vulture"
        "Vulture_White-backed": "White-backed vulture"
        "Vulture_White-headed": "White-headed vulture"
        "Others": "Others"
        "Unknown": "Unknown"

  - name: Split current nest_check events by group
    id: split_current_nest_check
    task: split_groups
    partial:
      df: ${{ workflow.map_species_colors.return }}
      groupers: ${{ workflow.resolved_groupers.return }}

  - name: Split previous nest_check events by group
    id: split_previous_nest_check
    task: split_groups
    partial:
      df: ${{ workflow.map_previous_species_column.return }}
      groupers: ${{ workflow.resolved_groupers.return }}

  - name: Split nest_id events by group
    id: split_nest_id
    task: split_groups
    partial:
      df: ${{ workflow.restore_col_nest_id.return }}
      groupers: ${{ workflow.resolved_groupers.return }}
  
  - name: Get unique conservation area 
    id: unique_conservation_area
    task: get_first_unique_str
    partial:
      column_name: "Conservation Name"
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_current_nest_check.return }}
  
  - name: Compute nest cycle status for all conservancies 
    id: compute_nest_status
    task: compute_nest_cycle_status 
    partial: 
      nest_id_col: "Nest ID"
      status_col: "Status"
    mapvalues:
      argnames: df 
      argvalues: ${{ workflow.split_current_nest_check.return }}

  - name: Zip computed nest status with nest check
    id: zip_compute_stat_check
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.compute_nest_status.return }}
        - ${{ workflow.split_current_nest_check.return }}

  - name: Get active table records 
    id: get_active_nests
    task: get_active_nests_table 
    partial: 
      nest_id_col: "Nest ID"
    mapvalues: 
      argnames: 
        - cycle_df 
        - original_df 
      argvalues: ${{ workflow.zip_compute_stat_check.return }}

  - name: Remove duplicate nests by outcome
    id: drop_active_duplicates
    task: resolve_duplicate_nests_by_outcome
    partial:
      nest_id_col: "Nest ID"
    mapvalues: 
      argnames: df 
      argvalues: ${{ workflow.get_active_nests.return }}

  - name: Calculate nest building summary table
    id: nest_build_summary
    task: build_nest_summary_table
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.drop_active_duplicates.return }}

  - name: Merge names for nest building summary 
    id: merge_nest_building
    task: merge_names
    partial: 
      b: "nest_building_summary_table"
    mapvalues:
      argnames: a
      argvalues: ${{ workflow.unique_conservation_area.return }}

  - name: Zip nest building table with conservation area for persistence 
    id: zip_nest_building
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.nest_build_summary.return }}
        - ${{ workflow.merge_nest_building.return }}

  - name: Persist nest building table as csv
    id: persist_nest_building 
    task: persist_df_wrapper
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: null 
      filetypes: 
        - "csv"
      sanitize: false 
    mapvalues:
      argnames: 
        - df 
        - filename_prefix

      argvalues: ${{ workflow.zip_nest_building.return }}   

  # Overall nest check for conservancies 
  - name: Parse overall df point 
    id: parse_overall_points 
