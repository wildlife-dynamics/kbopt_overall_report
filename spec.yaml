      time_col: extra__patrol_start_time
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true 
      format: mixed 

  - name: Rename value grouper columns for Trajectories
    id: traj_rename_grouper_columns
    task: map_columns
    partial:
      raise_if_not_found: true
      df: ${{ workflow.traj_add_temporal_index.return }}
      drop_columns: []
      retain_columns: []
      rename_columns:
        extra__patrol_type__value: patrol_type
        extra__patrol_serial_number: patrol_serial_number
        extra__patrol_status: patrol_status
        extra__patrol_subject: patrol_subject
        extra__patrol_id: patrol_id

  - name: Add spatial index to patrol trajectories
    id: add_spatial_index_patrol_traj
    task: add_spatial_index
    partial:
      gdf: ${{ workflow.traj_rename_grouper_columns.return }}
      groupers: ${{ workflow.resolved_groupers.return }}

  - name: Restore Conservation Name column for patrol trajectories
    id: restore_col_patrol_traj
    task: add_column_from_index_level
    partial:
      gdf: ${{ workflow.add_spatial_index_patrol_traj.return }}
      index_name: "SpatialGrouper_Conservation Name"
      column_name: "Conservation Name"

  - name: Persist patrols merged with kbopt gdf
    id: persist_patrols_kbopt_merge
    task: persist_df_wrapper
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: overall_merged_patrols
      filename_prefix: null
      filetypes: 
        - "geoparquet"
      sanitize: false 
      df: ${{ workflow.restore_col_patrol_traj.return }}

  - name: Split patrol trajectories by conservation area 
    id: split_patrol_traj_conservation
    task: split_groups
    partial:
      df: ${{ workflow.restore_col_patrol_traj.return }}
      groupers: ${{ workflow.resolved_groupers.return }}

  - name: Map names for patrol trajectories 
    id: merge_patrol_traj_names
    task: merge_names
    partial: 
      b: "patrol_trajectories"
    mapvalues:
      argnames: a
      argvalues: ${{ workflow.unique_conservation_area.return }}

  - name: Zip split patrol trajectories with conservation area for persistence 
    id: zip_patrol_traj_conservation
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.split_patrol_traj_conservation.return }}
        - ${{ workflow.merge_patrol_traj_names.return }}

  - name: Persist patrol trajectories by conservation area 
    id: persist_patrol_traj_conservation
    task: persist_df_wrapper
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: null 
      filetypes: 
        - "geoparquet"
      sanitize: false 
    mapvalues:
      argnames: 
        - df
        - filename_prefix
      argvalues: ${{ workflow.zip_patrol_traj_conservation.return }}

  - name: Patrol trajectories colormap 
    id: traj_colormap 
    task: apply_color_map 
    partial: 
      colormap: "Dark2"
      input_column_name: ${{ workflow.set_patrol_traj_color_column.return }}
      output_column_name: patrol_traj_colormap
    mapvalues:
      argnames: df
      argvalues:  ${{ workflow.split_patrol_traj_conservation.return }}

  - name: Create patrol trajectory layers 
    id: patrol_traj_layers 
    task: create_path_layer
    partial: 
      layer_style:
        get_color: patrol_traj_colormap
        get_width: 1.85
        width_scale: 1
        width_min_pixels: 2
        width_max_pixels: 6
        width_units: pixels
        cap_rounded: true 
        joint_rounded: true
        billboard: false
        opacity: 0.55
        stroked: true

      legend:
        title: "Patrol Trajectories"
        label_column: ${{ workflow.set_patrol_traj_color_column.return }}
        color_column: patrol_traj_colormap
        sort: ascending
        label_suffix: null 
    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.traj_colormap.return }}

  - name: Zip patrol trajectory layers with boundary layers 
    id: zip_patrol_traj_boundary
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.patrol_traj_layers.return }}
        - ${{ workflow.boundary_layer.return }}

  - name: Combine styled boundary layer with patrol trajectory layers 
    id: combine_patrol_traj_layers
    task: custom_combine_deckgl_map_layers
    mapvalues:
      argnames:
        - grouped_layers
        - static_layers
      argvalues: ${{ workflow.zip_patrol_traj_boundary.return }}

  - name: Zoom value to patrol trajectory boundary
    id: zoom_patrol_traj_boundary
    task: view_state_deck_gdf
    partial:
      pitch: 0
      bearing: 0
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.filter_kbopt_conservation.return }}

  - name: Zip map layers with zoom value
    id: zip_patrol_traj_zoom
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.combine_patrol_traj_layers.return }}
        - ${{ workflow.zoom_patrol_traj_boundary.return }}

  - name: Draw patrol trajectories map 
    id: draw_patrol_traj_map
    task: draw_map
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: "bottom-right"
    mapvalues:
      argnames:
        - geo_layers
        - view_state
      argvalues: ${{ workflow.zip_patrol_traj_zoom.return }}
  
  - name: Inject logo onto patrol html file 
    id: inject_patrols_logo
    task: inject_logo_into_html 
    partial: 
      logo_path: ${{ workflow.persist_kbopt_logo.return }}
    mapvalues:
      argnames: html_content
      argvalues: ${{ workflow.draw_patrol_traj_map.return }}

  - name: Merge conservancy name to filename
    id: merge_traj_conservancy 
    task: merge_names
    partial: 
      b: "patrol_trajectories_map.html"
    mapvalues:
      argnames: a
      argvalues:  ${{ workflow.unique_conservation_area.return }}
  
  - name: Zip filename with text for patrol trajectories map
    id: zip_traj_filename_text
    task: zip_groupbykey
    partial: 
      sequences: 
        - ${{ workflow.merge_traj_conservancy.return }}
        - ${{ workflow.inject_patrols_logo.return }}

  - name: Persist patrol trajectories map 
    id: persist_patrol_traj_map
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: 
        - filename 
        - text
      argvalues: ${{ workflow.zip_traj_filename_text.return }}

  - name: Convert patrol trajectories map html to png 
    id: convert_trajs_html_png
    task: html_to_png
    partial: 
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        full_page: false 
        device_scale_factor: 2.0 
        wait_for_timeout: 40000
        max_concurrent_pages: 1 
    mapvalues:
      argnames: html_path
      argvalues: ${{ workflow.persist_patrol_traj_map.return }}

  - name: Zip patrol trajectories with aoi
    id: zip_patrol_traj_aoi
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.split_patrol_traj_conservation.return }}
        - ${{ workflow.filter_kbopt_conservation.return }}

  - name: Compute patrol visits 
    id: patrol_grid_visits 
    task: patrol_coverage_grid
    partial: 
      grid_cell_size: 1000 
    mapvalues:
      argnames: 
        - trajs
        - aoi
      argvalues: ${{ workflow.zip_patrol_traj_aoi.return }}
  
  - name: Bin patrol visits with unvisited 
    id: bin_w_unvisited 
    task: bin_with_unvisited
    partial: 
      column: unique_patrol_count
      new_column: patrol_bins 
      n_bins: 8
      labels: null
      unvisited_value: 0
      unvisited_label: "unvisited"
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.patrol_grid_visits.return }}
  
  - name: Apply custom bin colors 
    id: apply_patrol_bin_colors 
    task: apply_bin_colors
    partial: 
      bin_column: patrol_bins
      new_column: patrol_bin_colors
      unvisited_label: "unvisited"
      unvisited_color: "#D3D3D3"
      cmap_name: "RdYlGn_r"
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.bin_w_unvisited.return }}
  
  - name: Create patrol visits grid layer 
    id: patrol_visits_layer 
    task: create_geojson_layer 
    partial: 
      layer_style: 
        filled: true 
        stroked: true 
        extruded: false 
        wireframe: false
        get_fill_color: colors
        get_line_color: [169, 169, 169]
        opacity: 0.11
        get_line_width: 0.15
        get_elevation: 0
        get_point_radius: 1
        line_width_units: pixels 
        line_width_scale: 1 
        line_width_min_pixels: 1
        line_width_max_pixels: 5

      legend:
        title: Visits per cell
        label_column: patrol_bins
        color_column: colors
    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.apply_patrol_bin_colors.return }}
  
  - name: Zip patrol visits layer with boundary layer 
    id: zip_patrol_visits_boundary
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.patrol_visits_layer.return }}
        - ${{ workflow.boundary_layer.return }}

  - name: Combine styled boundary layer with patrol visits layer
    id: combine_patrol_visits_layer
    task: custom_combine_deckgl_map_layers
    mapvalues:
      argnames:
        - grouped_layers
        - static_layers
      argvalues: ${{ workflow.zip_patrol_visits_boundary.return }}

  - name: Zip map layers with zoom value
    id: zip_patrol_visits_zoom
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.combine_patrol_visits_layer.return }}
        - ${{ workflow.zoom_patrol_traj_boundary.return }}

  - name: Draw patrol visits map
    id: draw_patrol_visits_map
    task: draw_map
    partial:
      tile_layers: ${{ workflow.configure_base_maps.return }}
      static: false
      title: null
      max_zoom: 10
      legend_style:
        placement: "bottom-right"
    mapvalues:
      argnames:
        - geo_layers
        - view_state
      argvalues: ${{ workflow.zip_patrol_visits_zoom.return }}

  - name: Inject logo onto patrol visits html file 
    id: inject_visits_logo
    task: inject_logo_into_html 
    partial: 
      logo_path: ${{ workflow.persist_kbopt_logo.return }}
    mapvalues:
      argnames: html_content
      argvalues: ${{ workflow.draw_patrol_visits_map.return }}

  - name: Merge conservancy name to filename
    id: merge_visits_conservancy 
    task: merge_names
    partial: 
      b: "patrol_visits_map.html"
    mapvalues:
      argnames: a
      argvalues:  ${{ workflow.unique_conservation_area.return }}
  
  - name: Zip filename with text for patrol visits
    id: zip_visits_filename_text
    task: zip_groupbykey
    partial: 
      sequences: 
        - ${{ workflow.merge_visits_conservancy.return }}
        - ${{ workflow.inject_visits_logo.return }}

  - name: Persist patrol visits map
    id: persist_patrol_visits_map
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: null
    mapvalues:
      argnames: 
        - filename
        - text
      argvalues: ${{ workflow.zip_visits_filename_text.return }}

  - name: Convert patrol visits map html to png 
    id: convert_visits_html_png
    task: html_to_png
    partial: 
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config: 
        full_page: false 
        device_scale_factor: 2.0 
        wait_for_timeout: 40000
        max_concurrent_pages: 1 
    mapvalues:
      argnames: html_path
      argvalues: ${{ workflow.persist_patrol_visits_map.return }}

  # Patrol efforts summary table 
  - name: Summarize patrol efforts by ranger
    id: summarize_ranger_patrol
    task: summarize_df
    partial:  
      groupby_cols: 
        - patrol_subject
      reset_index: true
      summary_params:
        - display_name: no_of_patrols
          aggregator: nunique
          column: patrol_id
        
        - display_name: total_distance
          aggregator: sum 
          column: dist_meters
          original_unit: m
          new_unit: km 
        
        - display_name: total_time
          aggregator: sum
          column : timespan_seconds
          original_unit: s
          new_unit: h
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_patrol_traj_conservation.return }}
  
  - name: Merge conservancy name to filename
    id: merge_summary_conservancy
    task: merge_names
    partial: 
      b: "patrol_efforts_summary"
    mapvalues:
      argnames: a
      argvalues:  ${{ workflow.unique_conservation_area.return }}

  - name: Zip patrol efforts summary with conservation area for persistence 
    id: zip_patrol_effort_conservation
    task: zip_groupbykey
    partial:
      sequences:
        - ${{ workflow.summarize_ranger_patrol.return }}
        - ${{ workflow.merge_summary_conservancy.return }}

  - name: Persist patrol efforts summary
    id: persist_patrol_effort
    task: persist_df_wrapper
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename: null 
      filetypes: 
        - "csv"
      sanitize: false
    mapvalues:
      argnames: 
        - df
        - filename_prefix
      argvalues: ${{ workflow.zip_patrol_effort_conservation.return }}

  # merge all into word doc 
  - name: Merge conservancy name and docx to persist filename
    id: merge_docx_names 
    task: merge_names
    partial: 
      b: "overall_report.docx"
    mapvalues:
      argnames: a 
      argvalues: ${{ workflow.unique_conservation_area.return }}

  - name: Zip conservancy name with docx name
    id: conservancy_docx
    task: zip_groupbykey
    partial: 
      sequences:
        - ${{ workflow.unique_conservation_area.return }}
        - ${{ workflow.merge_docx_names.return }}

  - name: Download KBOPT word template
    id: persist_kbopt_word
    task: fetch_and_persist_file
    partial: 
      url: https://www.dropbox.com/scl/fi/455zp265vce21052hvmiq/Nest-Monitoring-Report-Template.docx?rlkey=09y3qf08u9t0jhonwxfurc027&st=0cxqjlyu&dl=0
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      overwrite_existing: false
      retries: 3
      unzip: false

  - name: Generate word docx for all conservancies 
    id: word_docx_output
    task: generate_nest_report 
    partial: 
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      template_path: ${{ workflow.persist_kbopt_word.return }}
      time_period: ${{ workflow.time_range.return }}

    mapvalues:
      argnames: 
        - conservancy_name 
        - filename
      argvalues: ${{ workflow.conservancy_docx.return }}

  - name: Overall dashboard
    id: overall_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets: []
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.resolved_groupers.return }}
      