    partial:
      df: ${{ workflow.patrol_obs.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns:
        - patrol_start_time
        - patrol_end_time
        - fixtime

  - title: Trajectory Category
    type: task-group
    description: Differentiate tracks by color using the selected category.
    tasks:
      - name: null
        id: set_patrol_traj_color_column
        task: set_string_var
        partial:
          var: patrol_subject 

  - name: Transform Observations to Relocations
    id: patrol_reloc
    task: process_relocations
    partial:
      observations: ${{ workflow.convert_patrols_to_user_timezone.return }}
      relocs_columns:
        - patrol_id
        - patrol_start_time
        - patrol_end_time
        - patrol_type__value
        - patrol_type__display
        - patrol_serial_number
        - patrol_status
        - patrol_subject
        - groupby_col
        - fixtime
        - junk_status
        - extra__source
        - geometry
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000

  - name: Trajectory segment filter 
    id: patrol_traj 
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.patrol_reloc.return }}

